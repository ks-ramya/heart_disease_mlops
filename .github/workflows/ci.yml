name: CI - Lint, Test, Train

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (flake8 + black --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install lint tools
        run: pip install flake8==7.0.0 black==24.4.2
      - name: flake8
        run: flake8 src tests --max-line-length=110 --extend-ignore=E203,W503
      - name: black --check
        run: black --check src tests || (echo "::warning::Run 'make format' to fix formatting" && true)

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=src --cov-report=term --cov-report=xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  train:
    name: Train model (smoke run)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download dataset
        run: python -m src.data.download
      - name: Train + log to MLflow (local backend)
        run: python -m src.models.train
      - name: Evaluate persisted model
        run: python -m src.models.evaluate
      - name: Upload model + metrics + plots
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.sha }}
          path: |
            models/heart_disease_model.pkl
            models/metrics.json
            reports/figures/*.png
            mlruns/
          retention-days: 30
      - name: Job summary
        if: always()
        run: |
          echo "## Training Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f models/metrics.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat models/metrics.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
