apiVersion: v1
kind: Service
metadata:
  name: heart-disease-api
  namespace: heart-disease
  labels:
    app: heart-disease-api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8080"
spec:
  # NodePort works out-of-the-box on Minikube (`minikube service ...`)
  # and on Docker Desktop. On cloud providers (GKE/EKS/AKS) override with
  # `kubectl patch svc heart-disease-api -n heart-disease -p '{"spec":{"type":"LoadBalancer"}}'`.
  type: NodePort
  selector:
    app: heart-disease-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
