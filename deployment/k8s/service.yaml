apiVersion: v1
kind: Service
metadata:
  name: heart-disease-api
  namespace: heart-disease
  labels:
    app: heart-disease-api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8080"
spec:
  # Use LoadBalancer on cloud providers (GKE/EKS/AKS).
  # For Minikube/Docker Desktop, switch to NodePort or use `kubectl port-forward`.
  type: LoadBalancer
  selector:
    app: heart-disease-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
