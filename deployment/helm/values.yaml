replicaCount: 2

image:
  repository: heart-disease-api
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  API_HOST: "0.0.0.0"
  API_PORT: "8080"
  MODEL_PATH: "/app/models/heart_disease_model.pkl"
  LOG_LEVEL: "INFO"

probes:
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 5
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false
  className: nginx
  host: heart-disease.local

serviceMonitor:
  enabled: false  # set true when prometheus-operator is installed
